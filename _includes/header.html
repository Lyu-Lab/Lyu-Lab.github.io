<!DOCTYPE html>

<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>{{ page.title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ site.description }}">
    <meta name="theme-color" content="#235a9e">
    <meta http-equiv="Permissions-Policy" content="interest-cohort=()"/>
    <!-- Favicons: CMD (Computational Molecular Discovery) -->
    <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/img/favicon-32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="/static/img/favicon-48.png">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/static/img/apple-touch-icon.png">
    <link rel="preload" href="/static/css/bootstrap.min.css" as="style">
    <link rel="stylesheet" href="/static/css/bootstrap.min.css">
    <link href="/static/css/syntax.css" rel="stylesheet">
    <link href="/static/css/custom.css" rel="stylesheet">
  </head>

  <body>

    <!-- Static navbar -->
    <nav class="navbar navbar-expand-lg navbar-light site-navbar">
        <a class="navbar-brand" href="/">{{site.name}}</a>
        <a href="https://www.rockefeller.edu" rel="noopener" class="navbar-text navbar-affil">The Rockefeller University</a>
        <button type="button" class="navbar-toggler" data-toggle="collapse" data-target="#navbarContent" aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="navbar-collapse collapse" id="navbarContent">
          <ul class="navbar-nav ml-auto">
            {% for link in site.data.navigation %}
              {% if page.group == link.group %}
                <li class="nav-item active"><a class="nav-link" href="{{link.link}}"> {{link.name}}<span class="sr-only">(current)</span></a></li>
              {% else %}
                <li class="nav-item"><a class="nav-link" href="{{link.link}}"> {{link.name}}</a></li>
              {% endif %}
            {% endfor %}
          </ul>
        </div><!--/.nav-collapse -->
      </nav>

    <div class="container">
